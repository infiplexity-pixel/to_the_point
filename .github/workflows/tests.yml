name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest numpy tqdm
          pip install -e .
      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/test_datasets.py

  dataset-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pytest numpy tqdm
          pip install -e ".[datasets]"
      - name: Run MNIST test
        run: pytest tests/test_datasets.py::TestMNIST -v -m dataset
      - name: Run CIFAR-10 test
        run: pytest tests/test_datasets.py::TestCIFAR10 -v -m dataset
      - name: Run CIFAR-100 test
        run: pytest tests/test_datasets.py::TestCIFAR100 -v -m dataset
